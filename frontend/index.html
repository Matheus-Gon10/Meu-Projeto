<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Saudação</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Sistema de Saudação 👋</h1>

        <input
            type="text"
            id="nome"
            placeholder="Digite seu nome"
        >

        <button onclick="enviarNome()">
            Enviar
        </button>

        <h2 id="resultado"></h2>

        <script>

    async function enviarNome() {

        const nome = document.getElementById("nome").value;

        const resposta = await fetch(
            `http://localhost:3000/saudacao?nome=${nome}`
        );

        const dados = await resposta.json();

        document.getElementById("resultado").innerText =
            dados.mensagem;
    }

        </script>

    </div>

</body>
</html>
